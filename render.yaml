services:
  - type: web
    name: chaiforms-api
    env: node
    plan: free
    buildCommand: npx pnpm install --no-frozen-lockfile && npx pnpm run build --filter=@chaiforms/api
    startCommand: npx tsx apps/api/src/index.ts
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
